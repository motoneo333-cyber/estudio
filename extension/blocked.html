<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Momento de Concentración! 🍅</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(71, 85, 105, 0.4);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 24px;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(to right, #f87171, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 32px;
        }
        .quote-box {
            background: rgba(15, 23, 42, 0.6);
            border-left: 4px solid #ef4444;
            padding: 16px;
            border-radius: 0 12px 12px 0;
            text-align: left;
            margin-bottom: 32px;
            font-style: italic;
        }
        .quote-text {
            color: #e2e8f0;
            font-size: 15px;
            margin-bottom: 6px;
        }
        .quote-author {
            color: #f87171;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
        }
        .btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .footer-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-link:hover {
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="icon">🍅</span>
        <h1>¡Mantén la Concentración!</h1>
        <p>Este sitio web está bloqueado temporalmente para ayudarte a eliminar distracciones. Tu enfoque actual es tu mayor activo.</p>

        <div class="quote-box">
            <div class="quote-text">"La concentración y el trabajo duro son las verdaderas claves del éxito."</div>
            <div class="quote-author">— Helmut Schmidt</div>
        </div>

        <a href="http://localhost:3000" id="webapp-link" class="btn">Volver al Pomodoro</a>

        <a href="#" id="vercel-link" class="footer-link" style="display:none;">O abre tu app en Vercel</a>
    </div>

    <script>
        // Check if there is a saved Vercel domain or if we can infer one, or simply show the link if page is open
        chrome.storage.local.get(["extensionState"], (result) => {
            if (result && result.extensionState) {
                // If we want to show a custom Vercel webapp link, we can dynamically configure it
            }
        });

        // Parse original URL from parameter if present
        const params = new URLSearchParams(window.location.search);
        const original = params.get("original");
        if (original) {
            console.log("Intentaste acceder a: " + original);
        }
    </script>
</body>
</html>
